<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokémon Gen I - Pikachu</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <!-- Left Section -->
      <div class="left-section">
        <!-- Header -->
        <header class="header-left">
          <div class="logo">
            <img src="pokemon-logo.png" alt="Pokémon" class="logo-image" />
          </div>
        </header>

        <!-- Content -->
        <div class="content">
          <p class="generation">POKEMON GEN I</p>
          <h1 class="title">Pikachu</h1>
          <p class="description">
            Pikachu is an Electric-type Pokémon introduced in Generation I.
            Pikachu are small, chubby, and incredibly cute mouse-like Pokémon.
            They are almost completely covered by yellow fur.
          </p>
          <p class="counter">01 / 08</p>
        </div>

        <!-- Pokéball Decoration -->
        <div class="pokeball-decoration">
          <img src="pokeball.png" alt="Pokéball" class="pokeball-image" />
        </div>
      </div>

      <!-- Right Section -->
      <div class="right-section">
        <!-- Header -->
        <header class="header">
          <button class="menu-btn">☰</button>
        </header>

        <!-- Pikachu Image -->
        <div class="pikachu-container">
          <img src="pikachu.png" alt="Pikachu" class="pikachu-image" />
        </div>

        <!-- Pagination Dots -->
        <div class="pagination">
          <span class="dot active"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>
    </div>
  </body>
</html>
